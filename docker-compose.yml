version: "3.9"

services:
  backend:
    build: ./backend
    container_name: eaa_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
      - ./data/exports:/app/exports
    depends_on:
      - redis

  worker:
    build: ./backend
    container_name: eaa_worker
    command: celery -A celery_worker.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
      - ./data/exports:/app/exports
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: eaa_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: eaa_redis
    ports:
      - "6379:6379"
