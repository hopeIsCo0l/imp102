version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eaa_postgres
    environment:
      - POSTGRES_DB=eaa_recruit
      - POSTGRES_USER=eaa_user
      - POSTGRES_PASSWORD=eaa_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: eaa_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
      - ./data/exports:/app/exports
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    container_name: eaa_worker
    command: celery -A celery_worker.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
      - ./data/exports:/app/exports
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: eaa_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "18080:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: eaa_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
