name: CI/CD

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "postgres-migration"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile backend source
        run: python -m compileall app

      - name: App smoke test
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app

          client = TestClient(app)
          response = client.get("/health")
          assert response.status_code == 200, f"expected 200, got {response.status_code}"
          data = response.json()
          assert data.get("status") == "ok", f"expected status ok, got {data}"
          assert data.get("checks", {}).get("database", {}).get("ok") is True
          assert data.get("checks", {}).get("redis", {}).get("ok") is True
          print("Backend smoke test passed (DB + Redis OK).")
          PY

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  docker-config-check:
    name: Docker Compose Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config > /dev/null

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-config-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_BACKEND_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_FRONTEND_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger backend deploy hook
        run: |
          if [ -n "$RENDER_BACKEND_HOOK" ]; then
            curl -fsS -X POST "$RENDER_BACKEND_HOOK"
          else
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL not set, skipping."
          fi

      - name: Trigger frontend deploy hook
        run: |
          if [ -n "$RENDER_FRONTEND_HOOK" ]; then
            curl -fsS -X POST "$RENDER_FRONTEND_HOOK"
          else
            echo "RENDER_FRONTEND_DEPLOY_HOOK_URL not set, skipping."
          fi
